name: CI

on:
  pull_request:
    paths-ignore:
      - 'README.md'
      - 'CLAUDE.md'
      - 'agent.md'
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'CLAUDE.md'
      - 'agent.md'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NEXT_TELEMETRY_DISABLED: 1

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Restore Next.js cache
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock', 'package.json') }}-${{ hashFiles('pages/**/*', 'components/**/*', 'lib/**/*', 'data/**/*', 'styles/**/*', 'content/**/*', 'public/**/*', 'next.config.js', 'postcss.config.js', 'tailwind.config.js') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock', 'package.json') }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build site
        run: bun run build
